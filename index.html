<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
    --green: #00e5a0;
    --yellow: #ffd166;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(255,107,157,0.06) 0%, transparent 50%);
  }
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-meta { font-size: 12px; color: var(--text-muted); text-align: right; }
  .header-meta span { display: block; color: var(--green); font-weight: 500; }

  .controls {
    padding: 20px 40px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap { position: relative; flex: 1; min-width: 260px; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  #search {
    width: 100%;
    padding: 11px 16px 11px 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }
  select {
    padding: 11px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 180px;
    transition: border-color 0.2s;
  }
  select:focus { border-color: var(--accent); }
  .filter-btn {
    padding: 11px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .stats-bar {
    padding: 10px 40px;
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .stats-bar strong { color: var(--text); }
  #update-info { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .dot { width:7px; height:7px; border-radius:50%; background: var(--green); display:inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .upload-zone { padding: 16px 40px; border-bottom: 1px solid var(--border); display:flex; align-items:center; gap:16px; }
  .upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(108,99,255,0.12);
    border: 1px dashed rgba(108,99,255,0.4);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-btn:hover { background: rgba(108,99,255,0.22); }
  #file-input { display:none; }
  .upload-note { font-size: 11px; color: var(--text-muted); }

  main { padding: 24px 40px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease;
    cursor: default;
  }
  @keyframes fadeIn { from {opacity:0;transform:translateY(8px)} to {opacity:1;transform:translateY(0)} }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(108,99,255,0.15);
  }

  /* IMAGE AREA */
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 12px;
    transition: transform 0.3s;
  }
  .card:hover .card-img img { transform: scale(1.04); }
  .card-img .img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .card-img .img-placeholder svg { opacity: 0.3; }
  .img-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .search-img-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(108,99,255,0.85);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card:hover .search-img-btn { opacity: 1; }

  /* CARD BODY */
  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-code {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-iva { background: rgba(108,99,255,0.15); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); }
  .badge-exc { background: rgba(0,229,160,0.1); color: var(--green); border: 1px solid rgba(0,229,160,0.25); }
  .card-desc { font-size: 13px; line-height: 1.5; color: var(--text); font-weight: 400; flex: 1; }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-grupo { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stock-indicator { display: flex; align-items: center; gap: 5px; font-size: 12px; }
  .stock-dot { width: 7px; height: 7px; border-radius: 50%; }
  .stock-ok { background: var(--green); }
  .stock-low { background: var(--yellow); }
  .stock-out { background: #ff5c5c; }

  .no-results { text-align: center; padding: 80px 40px; color: var(--text-muted); grid-column: 1/-1; }
  .no-results h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }

  /* IMAGE MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 520px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 15px; margin-bottom: 16px; color: var(--text); line-height: 1.4; }
  .modal-imgs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .modal-img-option {
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    background: var(--surface2);
  }
  .modal-img-option:hover { border-color: var(--accent); transform: scale(1.03); }
  .modal-img-option.selected { border-color: var(--green); }
  .modal-img-option img { width: 100%; height: 100%; object-fit: cover; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-confirm { padding: 9px 18px; border-radius: 8px; border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .modal-loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .modal-loading .spinner { margin: 0 auto 12px; width: 32px; height: 32px; }
  .modal-loading p { font-size: 13px; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 13px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    header, .controls, .stats-bar, main, .upload-zone { padding-left:16px; padding-right:16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  }
</style>
</head>

let allProducts  = [];
let imageCache   = {};   // { codigo: url }
let stockFilter  = 'all';
let modalCodigo  = null;
let selectedUrl  = null;

/* ── INIT ── */
function init() {
  const saved  = localStorage.getItem(PRODUCTS_KEY);
  const date   = localStorage.getItem(UPDATE_KEY);
  const imgs   = localStorage.getItem(IMAGES_KEY);

  allProducts = saved ? JSON.parse(saved) : EMBEDDED;
  imageCache  = imgs  ? JSON.parse(imgs)  : {};

  const now = date || new Date().toLocaleDateString('es-CO');
  document.getElementById('last-update').textContent  = now;
  document.getElementById('update-text').textContent  = 'Actualizado: ' + now;
  document.getElementById('total').textContent         = allProducts.length;
  render();
}

/* ── RENDER ── */
function setStock(btn, val) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  stockFilter = val;
  render();
}

function render() {
  const q     = document.getElementById('search').value.toLowerCase().trim();
  const grupo = document.getElementById('group-filter').value;

  const results = allProducts.filter(p => {
    const mQ = !q || p.descripcion.toLowerCase().includes(q) || p.codigo.toLowerCase().includes(q);
    const mG = !grupo || p.grupo === grupo;
    const mS = stockFilter === 'all'
            || (stockFilter === 'disponible' && p.stock > 0)
            || (stockFilter === 'agotado'    && p.stock === 0);
    return mQ && mG && mS;
  });

  document.getElementById('showing').textContent = results.length;

  const grid = document.getElementById('grid');
  if (!results.length) {
    grid.innerHTML = '<div class="no-results"><h3>Sin resultados</h3><p>Intenta con otros términos</p></div>';
    return;
  }

  grid.innerHTML = results.map(p => {
    const sc  = p.stock > 10 ? 'stock-ok' : p.stock > 0 ? 'stock-low' : 'stock-out';
    const sl  = p.stock > 10 ? 'Disponible' : p.stock > 0 ? `Stock: ${p.stock}` : 'Agotado';
    const bdg = p.tiene_iva
      ? '<span class="badge badge-iva">+IVA</span>'
      : '<span class="badge badge-exc">Excluido IVA</span>';
    const imgUrl = imageCache[p.codigo];
    const imgHtml = imgUrl
      ? `<img src="${imgUrl}" alt="${p.descripcion}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=img-placeholder><svg width=36 height=36 fill=none stroke=currentColor stroke-width=1.5 viewBox=\"0 0 24 24\"><rect x=3 y=3 width=18 height=18 rx=2/><circle cx=8.5 cy=8.5 r=1.5/><polyline points=\"21 15 16 10 5 21\"/></svg><span>Sin imagen</span></div>'">`
      : `<div class="img-placeholder">
           <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           <span>Click para buscar imagen</span>
         </div>`;

    return `<div class="card">
      <div class="card-img" onclick="openImageSearch('${p.codigo}', \`${p.descripcion.replace(/`/g,"'")}\`)">
        ${imgHtml}
        <button class="search-img-btn" onclick="event.stopPropagation();openImageSearch('${p.codigo}',\`${p.descripcion.replace(/`/g,"'")}\`)">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          ${imgUrl ? 'Cambiar' : 'Buscar'}
        </button>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-code">${p.codigo}</div>${bdg}
        </div>
        <div class="card-desc">${p.descripcion}</div>
        <div class="card-bottom">
          <div class="card-grupo">${p.grupo}</div>
          <div class="stock-indicator">
            <div class="stock-dot ${sc}"></div>
            <span style="color:var(--text-muted)">${sl}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── IMAGE SEARCH via Claude API ── */
async function openImageSearch(codigo, descripcion) {
  modalCodigo = codigo;
  selectedUrl = null;
  document.getElementById('modal-title').textContent = descripcion;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-loading">
      <div class="spinner"></div>
      <p>Buscando imágenes con IA...</p>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Busca imágenes del producto: "${descripcion}". 
Necesito exactamente 6 URLs directas de imágenes JPG/PNG/WEBP del producto (no páginas web, solo URLs que terminen en .jpg, .jpeg, .png, .webp o sean imágenes directas de CDN de tiendas como Amazon, MercadoLibre, etc).
Responde SOLO con un JSON así (sin markdown, sin explicación):
{"urls":["url1","url2","url3","url4","url5","url6"]}`
        }]
      })
    });

    const data = await resp.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    
    let urls = [];
    try {
      const clean = text.replace(/```json|```/g,'').trim();
      urls = JSON.parse(clean).urls || [];
    } catch(e) {
      // Try to extract URLs from text
      const matches = text.match(/https?:\/\/[^\s"',}]+\.(jpg|jpeg|png|webp)[^\s"',}]*/gi) || [];
      urls = matches.slice(0, 6);
    }

    if (!urls.length) throw new Error('No se encontraron imágenes');
    renderModalImages(urls);

  } catch(err) {
    document.getElementById('modal-body').innerHTML = `
      <p style="color:var(--text-muted);text-align:center;padding:30px 0;font-size:13px;">
        ⚠️ No se pudieron cargar imágenes.<br>
        <small>Intenta de nuevo más tarde.</small>
      </p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
      </div>`;
  }
}

function renderModalImages(urls) {
  const current = imageCache[modalCodigo];
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-imgs" id="modal-imgs">
      ${urls.map(url => `
        <div class="modal-img-option ${url===current?'selected':''}" onclick="selectImg(this,'${url}')">
          <img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'">
        </div>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmImg()">✓ Usar imagen</button>
    </div>`;
  if (current) selectedUrl = current;
}

function selectImg(el, url) {
  document.querySelectorAll('.modal-img-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedUrl = url;
}

function confirmImg() {
  if (!selectedUrl || !modalCodigo) return;
  imageCache[modalCodigo] = selectedUrl;
  localStorage.setItem(IMAGES_KEY, JSON.stringify(imageCache));
  closeModal();
  render();
  showToast('✅ Imagen guardada');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  modalCodigo = null;
}

/* ── FILE UPLOAD ── */
document.getElementById('file-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const lines = text.split('\n').filter(l => l.trim() && !l.includes('------'));
  const headers = lines[0].split('\t').map(h => h.trim());

  const idx = k => headers.findIndex(h => h.toLowerCase().includes(k));
  const codigoIdx = idx('codigo'), descIdx = idx('descripcion'),
        grupoIdx  = idx('grupo'),  stockIdx = idx('stock'),
        taxIdx    = idx('tax'),    precioIdx = idx('antes');

  if (codigoIdx === -1 || descIdx === -1) {
    showToast('❌ Formato no reconocido', true); return;
  }

  const products = [];
  for (let i = 1; i < lines.length; i++) {
    const c = lines[i].split('\t');
    if (!c[codigoIdx]?.trim().startsWith('PRD')) continue;
    const tax = taxIdx >= 0 ? c[taxIdx]?.trim() : '';
    if (!['IVAG01','IVAGEXC'].includes(tax)) continue;
    let precio = 0;
    if (precioIdx >= 0) precio = parseFloat((c[precioIdx]||'').replace(/[$. ]/g,'').replace(',','.')) || 0;
    if (tax === 'IVAGEXC' && precio > UVT_LIMIT) continue;
    products.push({
      codigo: c[codigoIdx].trim(),
      descripcion: c[descIdx].trim(),
      grupo: grupoIdx >= 0 ? c[grupoIdx]?.trim() : '',
      stock: parseInt(c[stockIdx]) || 0,
      tiene_iva: tax === 'IVAG01'
    });
  }

  if (!products.length) { showToast('❌ No se encontraron productos', true); return; }
  allProducts = products;
  const now = new Date().toLocaleDateString('es-CO');
  localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
  localStorage.setItem(UPDATE_KEY, now);
  document.getElementById('last-update').textContent = now;
  document.getElementById('update-text').textContent = 'Actualizado: ' + now;
  document.getElementById('total').textContent = products.length;
  render();
  showToast(`✅ ${products.length} productos cargados`);
  this.value = '';
});

/* ── UTILS ── */
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? '#ff5c5c' : 'var(--green)';
  t.style.color = err ? '#ff5c5c' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('group-filter').addEventListener('change', render);
init();
</script>
